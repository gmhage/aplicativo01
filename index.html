<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplicativo01 — Demo de Design</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root{
            --bg:#0f1724; /* deep slate */
            --surface:#0b1220;
            --accent:#ff6b6b; /* warm accent */
            --muted:#94a3b8;
            --max-width:1100px;
            --radius:12px;
        }
        *{box-sizing:border-box}
        html,body{height:100%;margin:0;font-family:Inter,system-ui,Segoe UI,Roboto,"Helvetica Neue",Arial}
        body{background:var(--bg);color:#e6eef8;display:flex;align-items:center;justify-content:center;padding:48px}
        .wrap{width:100%;max-width:var(--max-width)}
        .hero{background:linear-gradient(135deg,rgba(255,107,107,0.12),transparent 30%),var(--surface);padding:48px;border-radius:var(--radius);display:grid;grid-template-columns:1fr 320px;gap:24px;align-items:center}
        .kicker{color:var(--muted);text-transform:uppercase;letter-spacing:1px;font-size:12px;margin-bottom:8px}
        h1{font-family:'Playfair Display',serif;font-size:42px;margin:0 0 12px;line-height:1.02}
        p.lead{color:var(--muted);margin:0 0 20px}
        .cta{display:inline-flex;align-items:center;gap:10px;background:var(--accent);color:#081020;padding:12px 18px;border-radius:10px;border:none;font-weight:700;cursor:pointer}
        .signature{height:100%;display:flex;align-items:center;justify-content:center}
        .sig-card{background:#06111b;border-radius:10px;padding:18px;width:100%;text-align:center}
        .sig-accent{display:inline-block;width:64px;height:64px;background:linear-gradient(135deg,#ff9a8b,#ff6b6b);border-radius:10px;transform:rotate(12deg);box-shadow:0 8px 20px rgba(0,0,0,0.6)}
        @media (max-width:820px){.hero{grid-template-columns:1fr;padding:28px;grid-template-rows:auto auto}.signature{order:-1}}
        @media (prefers-reduced-motion:reduce){*{transition:none;animation:none}}
        button:focus{outline:3px solid rgba(255,107,107,0.28);outline-offset:4px}
    </style>
</head>
<body>
    <main class="wrap">
        <section class="hero" aria-labelledby="hero-heading">
            <div>
                <div class="kicker">Design: Direção Intencional</div>
                <h1 id="hero-heading">Identidade visual com presença memorável</h1>
                <p class="lead">Uma paleta focada, tipografia pensada e uma assinatura visual única — este é um exemplo prático inspirado na skill <strong>frontend-design</strong>.</p>
                <div>
                    <button class="cta">Ver protótipo</button>
                </div>
            </div>
            <aside class="signature" aria-hidden="false">
                <div class="sig-card">
                    <div class="sig-accent" aria-hidden="true"></div>
                    <div style="margin-top:12px;color:var(--muted);font-size:13px">Assinatura: Acento rotacionado</div>
                </div>
            </aside>
        </section>
    </main>
</body>
</html>
